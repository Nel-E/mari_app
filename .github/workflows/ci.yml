name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: ktlint check
        run: ./gradlew ktlintCheck --stacktrace

      - name: Detekt
        run: ./gradlew detekt --stacktrace

      - name: :shared unit tests
        run: ./gradlew :shared:test --stacktrace

      - name: :app lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: :wear lint
        run: ./gradlew :wear:lintDebug --stacktrace

      - name: :app unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: :wear unit tests
        run: ./gradlew :wear:testDebugUnitTest --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            wear/build/reports/lint-results-debug.html

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            shared/build/reports/tests/
            app/build/reports/tests/
            wear/build/reports/tests/
